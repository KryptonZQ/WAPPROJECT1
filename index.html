<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Retro Game Vault 🎮</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin: 20px;
        }

        .controls {
            margin: 20px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            border: none;
            margin-right: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background: #16a34a;
        }

        #loading {
            font-size: 20px;
            margin-top: 20px;
        }

        #container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 10px;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>🎮 Retro Game Vault</h1>

    <div class="controls">
        <input id="search" placeholder="Search games..." />

        <button onclick="sortByRating()">Sort by Rating</button>
        <button onclick="sortByDate()">Sort by Date</button>
    </div>

    <div id="loading" style="display:none;">Loading...</div>

    <div id="container"></div>

    <script src="script.js"></script>

</body>

</html>
