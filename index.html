<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Retro Game Vault 🎮</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>🎮 Retro Game Vault</h1>

    <div class="controls">
        <input id="search" placeholder="Search games..." />
        <select id="genreFilter" aria-label="Filter by genre">
            <option value="all">All Genres</option>
        </select>
        <select id="ratingFilter" aria-label="Filter by minimum rating">
            <option value="0">Any Rating</option>
            <option value="3">Rating 3+</option>
            <option value="4">Rating 4+</option>
            <option value="4.5">Rating 4.5+</option>
        </select>
        <select id="sortSelect" aria-label="Sort games">
            <option value="rating-desc">Rating (High to Low)</option>
            <option value="rating-asc">Rating (Low to High)</option>
            <option value="date-desc">Newest Release</option>
            <option value="date-asc">Oldest Release</option>
            <option value="name-asc">Name (A-Z)</option>
            <option value="name-desc">Name (Z-A)</option>
        </select>
        <button id="themeToggle" type="button">☀️ Light Mode</button>
    </div>

    <p id="resultsInfo"></p>

    <div id="loading" style="display:none;">Loading...</div>

    <div id="container"></div>

    <script src="script.js"></script>

</body>

</html>
